lane_follower_node:
  ros__parameters:
    use_sim_time: true
    control_rate: 20.0
    # Lane boundary extraction
    min_x: 0.5
    max_x: 8.0
    bin_width: 0.50
    min_points_per_bin: 2
    lane_width: 3.0
    # Pure pursuit
    cruise_speed: 0.35
    lookahead_min: 0.6
    lookahead_max: 4.0
    speed_gain: 0.8
    max_angular_vel: 1.5
    curve_slowdown_curvature: 0.5
    curve_slowdown_factor: 0.7
    # No-lane safety
    no_lane_timeout: 3.0
    # A* waypoint graph obstacle avoidance
    # obstacle_clearance now only needs robot_half_width + margin
    # (obstacle physical size comes from surface points, not inflation)
    obstacle_clearance: 0.45
    min_gap_width: 0.80
    center_weight: 0.0
    # Steering smoothing (higher = more responsive)
    steering_alpha: 0.50
    # Max angular acceleration (rad/s per second) — prevents harsh whipping
    max_angular_accel: 4.0
    # Path hysteresis (penalize switching from previous path)
    path_hysteresis: 15.0
    # Approach mode: 'baseline', 'A', 'B', 'C', 'D'
    approach_mode: 'A'
    # Approach A: size-aware clearance
    # Chassis 0.8x0.6m — corner is 0.50m from center, use 0.40m as effective radius
    robot_half_width: 0.35
    safety_margin: 0.25
    # min/max_obstacle_radius removed — real course has unknown obstacle sizes
    # Approach B: side commitment
    side_lock_weight: 2.0
    side_lock_decay: 0.95
    # Approach C: distance graduation
    clearance_far_scale: 1.3
    clearance_near_scale: 0.8
    clearance_far_threshold: 3.0
    clearance_near_threshold: 1.5
    # Architectural improvements
    waypoints_per_gap: 1
    path_smooth_passes: 3
    obstacle_stale_time: 15.0
    # World-frame persistence
    lane_persist_time: 2.0        # seconds to keep lane points (short to avoid curve noise)
    obstacle_persist_time: 30.0   # seconds to keep obstacles in world frame
    persist_max_behind: 3.0       # max meters behind robot to retain
    # Track goal / heading recovery
    # When heading deviates > threshold from track direction, switch to
    # goal pursuit mode (pure pursuit toward world-frame goal waypoint)
    goal_ahead_distance: 10.0
    recovery_heading_threshold: 1.0   # radians (~57°)
    recovery_speed_factor: 0.8
    # Ramp detection via IMU pitch
    ramp_pitch_threshold: 0.10   # rad (~5.7°) — enter ramp mode
    ramp_pitch_exit: 0.05        # rad (~2.9°) — start exit timer
    ramp_speed: 0.25             # m/s on ramp
    ramp_exit_hold: 1.0          # seconds flat before exiting ramp mode
