# robot_localization configuration for the real LittleBlue robot.
#
# Two EKFs:
#   ekf_local_node   — fuses IMU + wheel odom into /odometry/filtered
#                      (odom → base_footprint TF)
#   ekf_global_node  — fuses the local estimate + GPS into
#                      /odometry/filtered_map (map → odom TF)
#
# navsat_transform_node converts /gps/fix (NavSatFix) into the
# map-frame odometry the global EKF consumes.
#
# Assumptions (change if the drivers disagree):
#   /odom           nav_msgs/Odometry  from the wheel/motor controller
#   /imu/data       sensor_msgs/Imu
#   /gps/fix        sensor_msgs/NavSatFix
#
# World frame origin: the *first* GPS fix received after boot becomes
# the datum (wait_for_datum=false + publish_filtered_gps=true). No
# manual datum entry needed.

ekf_local_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    odom0: /odom
    # x   y   z   r p y   vx vy vz  vr vp vy  ax ay az
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: true

    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  true,  true,  false]
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true

ekf_global_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map

    odom0: /odometry/filtered
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false

    odom1: /odometry/gps
    odom1_config: [true, true, false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_relative: false

    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false

navsat_transform_node:
  ros__parameters:
    frequency: 30.0
    delay: 3.0
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0            # set if IMU yaw ≠ ENU east-is-zero
    zero_altitude: true
    broadcast_utm_transform: false
    publish_filtered_gps: true  # emit /gps/filtered with EKF output in lat/lon
    use_odometry_yaw: false
    wait_for_datum: false        # auto-capture datum from first fix
