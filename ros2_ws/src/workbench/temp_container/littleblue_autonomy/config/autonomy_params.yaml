lane_follower_node:
  ros__parameters:
    use_sim_time: true
    control_rate: 20.0
    # Centerline computation
    min_x: 0.5
    max_x: 5.0
    bin_width: 0.5
    min_points_per_bin: 3
    lane_width: 3.0
    min_centerline_points: 2
    centerline_spread_threshold: 1.0
    # Pure pursuit
    cruise_speed: 0.5
    lookahead_min: 1.0
    lookahead_max: 3.0
    speed_gain: 0.8
    max_angular_vel: 1.0
    curve_slowdown_curvature: 0.5
    curve_slowdown_factor: 0.6
    # Obstacle detection
    obstacle_half_angle: 35.0
    obstacle_min_range: 0.8
    obstacle_detect_range: 3.0
    obstacle_min_hits: 3
    # Reactive evasion
    max_evasion_offset: 1.5
    gap_clearance_threshold: 3.0
    evasion_min_distance: 5.0
    evasion_speed_factor: 0.5
    # State machine
    no_lane_timeout: 3.0
    # Ramp obstacle suppression
    # Waypoints [x1, y1, x2, y2, ...] in world frame (from /world_pose)
    # Ramp entry at world x=-0.25, exit at world x=4.25
    ramp_waypoints: [-0.25, 0.0, 4.25, 0.0]
    ramp_suppression_radius: 3.0
