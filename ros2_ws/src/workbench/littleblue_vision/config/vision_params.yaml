    rgb_cx: 320.0
    rgb_cy: 240.0
    camera_height: 0.27
    camera_forward_offset: 0.38
    camera_lateral_offset: 0.28
    min_range: 0.4
    max_range: 6.0
    frame_skip: 2
    image_topic: '/left_camera/image_raw'

